name: fast_linter
description: >-
  AST-only Dart linter for speed. Runs existing AbstractAnalysisRule lint rules
  without type analysis by using only parseString() from package:analyzer.
version: 0.2.0
repository: https://github.com/ryota0624/fast_linter

topics:
  - linter
  - static-analysis
  - dart-analyzer
  - code-quality

environment:
  sdk: ^3.10.9

dependencies:
  args: ^2.7.0
  analyzer: ^9.0.0
  dart_mcp: ^0.5.0
  path: ^1.9.0
  json_rpc_2: ^3.0.2
  package_config: ^2.1.0
  stream_channel: ^2.1.4
  yaml: ^3.1.3

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
