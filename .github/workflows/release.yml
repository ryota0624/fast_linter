name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get current version
        id: current
        run: |
          version=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next
        run: |
          IFS='.' read -r major minor patch <<< "${{ steps.current.outputs.version }}"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "version=${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Update pubspec.yaml version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.next.outputs.version }}/" pubspec.yaml

      - name: Generate changelog entry
        run: |
          # Collect conventional commit messages since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --oneline --pretty=format:"- %s")
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline --pretty=format:"- %s")
          fi

          # Prepend new entry to CHANGELOG.md
          NEW_ENTRY="## ${{ steps.next.outputs.version }}\n\n${COMMITS}\n"
          if [ -f CHANGELOG.md ]; then
            echo -e "${NEW_ENTRY}\n$(cat CHANGELOG.md)" > CHANGELOG.md
          else
            echo -e "${NEW_ENTRY}" > CHANGELOG.md
          fi

      - name: Commit and tag
        run: |
          git add pubspec.yaml CHANGELOG.md
          git commit -m "chore: release v${{ steps.next.outputs.version }}"
          git tag "v${{ steps.next.outputs.version }}"
          git push origin main --tags
