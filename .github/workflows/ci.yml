name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - run: dart pub get
      - name: Run fast_linter
        run: dart run bin/fast_linter.dart lib/
      - name: Run dart test
        run: dart test
      - name: Run dart analyze
        run: dart analyze --fatal-infos
